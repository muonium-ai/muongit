name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Validate tag matches VERSION file
        id: check
        run: |
          version=$(cat VERSION)
          tag="${GITHUB_REF#refs/tags/v}"
          if [ "$version" != "$tag" ]; then
            echo "::error::Tag v$tag does not match VERSION file ($version)"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

  rust:
    needs: validate
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: muongit-darwin-arm64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: muongit-linux-amd64
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release
      - run: cargo test
      - name: Package artifact
        run: |
          mkdir -p ../artifacts
          cp target/release/libmuongit.* ../artifacts/ 2>/dev/null || true
          cp target/release/muongit ../artifacts/ 2>/dev/null || true
          cd ../artifacts && tar czf ${{ matrix.artifact }}.tar.gz * && rm -f !(*.tar.gz)
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: artifacts/${{ matrix.artifact }}.tar.gz

  swift:
    needs: validate
    runs-on: macos-latest
    defaults:
      run:
        working-directory: swift
    steps:
      - uses: actions/checkout@v4
      - run: swift build -c release
      - run: swift test
      - name: Package artifact
        run: |
          mkdir -p ../artifacts
          cp -r .build/release/libMuonGit.* ../artifacts/ 2>/dev/null || true
          cp -r .build/release/MuonGit.* ../artifacts/ 2>/dev/null || true
          cd ../artifacts && tar czf muongit-swift-darwin.tar.gz * && rm -f !(*.tar.gz)
      - uses: actions/upload-artifact@v4
        with:
          name: muongit-swift-darwin
          path: artifacts/muongit-swift-darwin.tar.gz

  kotlin:
    needs: validate
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact: muongit-kotlin-darwin
          - os: ubuntu-latest
            artifact: muongit-kotlin-linux
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: kotlin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew build -Prelease=true
      - run: ./gradlew test
      - name: Package artifact
        run: |
          mkdir -p ../artifacts
          cp build/libs/*.jar ../artifacts/
          cd ../artifacts && tar czf ${{ matrix.artifact }}.tar.gz * && rm -f !(*.tar.gz)
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: artifacts/${{ matrix.artifact }}.tar.gz

  release:
    needs: [validate, rust, swift, kotlin]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ needs.validate.outputs.version }}" \
            --title "v${{ needs.validate.outputs.version }}" \
            --generate-notes \
            artifacts/*.tar.gz
